services:
  - type: web
    name: flask-backend
    region: oregon
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: FRONTEND_URL
        value: https://react-frontend.onrender.com  # update to your actual static site URL
      - key: STRIPE_SECRET_KEY
        sync: false  # set this in the Render dashboard

  - type: web
    name: react-frontend
    region: oregon
    plan: free
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://flask-backend.onrender.com  # update to your actual backend URL
